<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sculpt — Your ideas into 3D Magic</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Manrope', sans-serif; background: #f2f2f0; color: #2b2b2b; min-height: 100vh; }
    .top-label { position: fixed; top: 16px; left: 24px; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #999; z-index: 100; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 28px 48px; }
    .nav-logo { font-size: 18px; font-weight: 700; color: #2b2b2b; letter-spacing: -0.02em; text-decoration: none; display: flex; align-items: center; gap: 2px; }
    .nav-logo .plus { font-weight: 300; margin-right: 2px; }
    .nav-links { display: flex; align-items: center; gap: 40px; list-style: none; }
    .nav-links a { font-size: 16px; font-weight: 400; color: #4a4a4a; text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: #2b2b2b; }
    .nav-right { display: flex; align-items: center; }
    .btn-login { font-family: 'Manrope', sans-serif; font-size: 15px; font-weight: 500; color: #2b2b2b; background: transparent; border: 1.5px solid #c8c8c8; border-radius: 50px; padding: 9px 22px; cursor: pointer; transition: border-color 0.2s, background 0.2s; text-decoration: none; }
    .btn-login:hover { border-color: #2b2b2b; background: rgba(0,0,0,0.04); }
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 24px; }
    .hero h1 { font-size: 80px; font-weight: 700; line-height: 1.08; letter-spacing: -0.03em; color: #2b2b2b; margin-bottom: 8px; }
    .hero h1 .light { font-weight: 300; }
    .hero h1 .bold-line { display: block; font-weight: 800; }
    .hero h1 sup { font-size: 32px; font-weight: 300; vertical-align: super; line-height: 0; }
    .hero-subtitle { font-size: 24px; font-weight: 400; color: #777; line-height: 1.5; margin-top: 24px; margin-bottom: 40px; max-width: 400px; }
    .btn-cta-wrapper { position: relative; display: inline-block; border-radius: 50px; padding: 2px; background: linear-gradient(90deg, #e8e8e8 0%, #d0a0f0 20%, #90c0ff 40%, #a0f0d0 60%, #f0f0a0 80%, #e8e8e8 100%); }
    .btn-cta { position: relative; display: inline-flex; align-items: center; gap: 8px; font-family: 'Manrope', sans-serif; font-size: 16px; font-weight: 500; color: #2b2b2b; background: #f2f2f0; border: none; border-radius: 50px; padding: 14px 28px; cursor: pointer; transition: background 0.2s; text-decoration: none; }
    .btn-cta:hover { background: #ebebea; }
    .btn-cta .cta-icon { width: 22px; height: 22px; border: 1.5px solid #2b2b2b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .skater { position: fixed; pointer-events: none; z-index: 5; opacity: 0.82; will-change: transform; filter: drop-shadow(0 6px 16px rgba(30,71,153,0.18)); }
    .skater-1 { top: 14%; left: 4%; animation: float-1 6s ease-in-out infinite; }
    .skater-2 { top: 48%; right: 5%; animation: float-2 7.5s ease-in-out infinite; }
    .skater-3 { bottom: 10%; left: 10%; animation: float-3 8s ease-in-out infinite; }
    @keyframes float-1 { 0%,100%{transform:translateY(0px) rotate(-2deg)} 35%{transform:translateY(-20px) rotate(2deg)} 65%{transform:translateY(10px) rotate(-3deg)} }
    @keyframes float-2 { 0%,100%{transform:translateY(0px) rotate(2deg)} 40%{transform:translateY(-16px) rotate(-2deg)} 70%{transform:translateY(12px) rotate(3deg)} }
    @keyframes float-3 { 0%,100%{transform:translateY(0px) rotate(1deg)} 30%{transform:translateY(14px) rotate(-2deg)} 65%{transform:translateY(-18px) rotate(2deg)} }
    .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; z-index: 0; }
    .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #c4b5fd, transparent); top: -100px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #93c5fd, transparent); bottom: -80px; right: -80px; }
    .hero { position: relative; z-index: 1; }
    nav { z-index: 10; }
    @media (max-width: 768px) { nav{padding:20px 24px} .nav-links{gap:24px} .hero h1{font-size:52px} .hero-subtitle{font-size:18px} }
    @media (max-width: 520px) { .nav-links{display:none} .hero h1{font-size:40px} .hero h1 sup{font-size:20px} }
  </style>
</head>
