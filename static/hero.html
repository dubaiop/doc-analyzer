<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sculpt — Your ideas into 3D Magic</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background: #f5f5f2;
      color: #1a1a2e;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Custom cursor ──────────────────────────────────────────── */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: #1e4799;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.25s, height 0.25s, opacity 0.25s, background 0.25s;
      mix-blend-mode: multiply;
    }

    .cursor-ring {
      position: fixed;
      width: 38px; height: 38px;
      border: 1.5px solid rgba(30,71,153,0.35);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, border-color 0.3s;
    }

    body.hovering .cursor      { width: 18px; height: 18px; opacity: 0.5; }
    body.hovering .cursor-ring { width: 52px; height: 52px; }

    /* ── Animated background ────────────────────────────────────── */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-glow::before, .bg-glow::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.22;
    }

    .bg-glow::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #c4b5fd, transparent 70%);
      top: -120px; left: -120px;
      animation: blob-drift-a 14s ease-in-out infinite alternate;
    }

    .bg-glow::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #93c5fd, transparent 70%);
      bottom: -100px; right: -100px;
      animation: blob-drift-b 18s ease-in-out infinite alternate;
    }

    @keyframes blob-drift-a {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(80px,60px) scale(1.15); }
      100% { transform: translate(30px,120px) scale(0.95); }
    }

    @keyframes blob-drift-b {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(-70px,-50px) scale(1.1); }
      100% { transform: translate(-20px,-110px) scale(0.9); }
    }

    /* Mouse-reactive glow */
    .cursor-glow {
      position: fixed;
      width: 360px; height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.4s;
    }

    /* ── Navbar ─────────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 1080px;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 24px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 50px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.03);
      opacity: 0;
      animation: fade-down 0.7s ease forwards 0.1s;
    }

    .nav-logo {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.02em;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .nav-logo .plus { font-weight: 300; margin-right: 1px; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-size: 15px;
      font-weight: 500;
      color: #555;
      text-decoration: none;
      position: relative;
      padding-bottom: 2px;
      transition: color 0.2s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      width: 0; height: 1.5px;
      background: #1e4799;
      border-radius: 2px;
      transform: translateX(-50%);
      transition: width 0.25s ease;
    }

    .nav-links a:hover { color: #1a1a2e; }
    .nav-links a:hover::after { width: 100%; }

    .btn-login {
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      background: transparent;
      border: 1.5px solid rgba(0,0,0,0.14);
      border-radius: 50px;
      padding: 7px 20px;
      cursor: none;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .btn-login:hover {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }

    /* ── Hero section ───────────────────────────────────────────── */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
      gap: 0;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1e4799;
      background: rgba(30,71,153,0.07);
      border: 1px solid rgba(30,71,153,0.15);
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fade-up 0.6s ease forwards 0.3s;
    }

    .hero-badge .dot {
      width: 6px; height: 6px;
      background: #1e4799;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    .hero h1 {
      font-size: 80px;
      font-weight: 700;
      line-height: 1.06;
      letter-spacing: -0.035em;
      color: #1a1a2e;
      margin-bottom: 6px;
      opacity: 0;
      animation: fade-up 0.7s ease forwards 0.5s;
    }

    .hero h1 .light {
      font-weight: 300;
      color: #555;
      display: block;
    }

    .hero h1 .bold-line {
      display: block;
      font-weight: 800;
      background: linear-gradient(110deg, #1e4799 0%, #6366f1 45%, #a855f7 70%, #1e4799 100%);
      background-size: 250% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fade-up 0.7s ease forwards 0.5s, shimmer 5s linear infinite 1.5s;
    }

    @keyframes shimmer {
      to { background-position: 250% center; }
    }

    .hero h1 sup {
      font-size: 26px;
      font-weight: 400;
      vertical-align: super;
      line-height: 0;
      -webkit-text-fill-color: #a855f7;
    }

    .hero-subtitle {
      font-size: 22px;
      font-weight: 400;
      color: #888;
      line-height: 1.6;
      margin-top: 22px;
      margin-bottom: 44px;
      max-width: 400px;
      opacity: 0;
      animation: fade-up 0.7s ease forwards 0.7s;
    }

    /* ── CTA button ─────────────────────────────────────────────── */
    .btn-cta-wrap {
      opacity: 0;
      animation: fade-up 0.7s ease forwards 0.9s;
    }

    .btn-cta-outer {
      position: relative;
      display: inline-block;
      border-radius: 50px;
      padding: 2px;
      background: conic-gradient(
        from var(--angle),
        #e2e8f0, #818cf8, #60a5fa, #34d399, #fbbf24, #f472b6, #818cf8, #e2e8f0
      );
      animation: rotate-border 4s linear infinite;
    }

    @keyframes rotate-border {
      to { --angle: 360deg; }
    }

    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      background: #f5f5f2;
      border: none;
      border-radius: 50px;
      padding: 15px 30px;
      cursor: none;
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: background 0.2s, box-shadow 0.3s, transform 0.2s;
      position: relative;
      z-index: 1;
    }

    .btn-cta:hover {
      background: #fff;
      box-shadow: 0 10px 36px rgba(99,102,241,0.2);
    }

    .btn-cta .cta-icon {
      width: 22px; height: 22px;
      border: 1.5px solid #1a1a2e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    /* ── Stats bar ──────────────────────────────────────────────── */
    .stats {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-top: 64px;
      opacity: 0;
      animation: fade-up 0.7s ease forwards 1.1s;
    }

    .stat { text-align: center; }

    .stat-number {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #1a1a2e;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .stat-sep {
      width: 1px;
      height: 28px;
      background: rgba(0,0,0,0.1);
    }

    /* ── Scroll hint ────────────────────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fade-up 0.6s ease forwards 1.4s;
    }

    .scroll-hint-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #bbb;
    }

    .scroll-track {
      width: 20px; height: 32px;
      border: 1.5px solid #ccc;
      border-radius: 10px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 5px;
    }

    .scroll-thumb {
      width: 4px; height: 7px;
      background: #aaa;
      border-radius: 2px;
      animation: scroll-bounce 1.8s ease-in-out infinite;
    }

    @keyframes scroll-bounce {
      0%,100% { transform: translateY(0); opacity: 0.5; }
      50%      { transform: translateY(10px); opacity: 1; }
    }

    /* ── Ice dancer characters ──────────────────────────────────── */
    .skater {
      position: fixed;
      pointer-events: auto;
      z-index: 5;
      filter: drop-shadow(0 8px 20px rgba(30,71,153,0.14));
      opacity: 0;
      transition: filter 0.3s;
      animation: skater-in 0.8s ease forwards;
    }

    .skater:hover {
      filter: drop-shadow(0 12px 28px rgba(30,71,153,0.3)) drop-shadow(0 0 20px rgba(99,102,241,0.25));
      cursor: none;
    }

    .skater-1 { top: 12%; left: 3%;   animation-delay: 1.1s; }
    .skater-2 { top: 44%; right: 3%;  animation-delay: 1.3s; }
    .skater-3 { bottom: 8%; left: 8%; animation-delay: 1.5s; }

    @keyframes skater-in {
      from { opacity: 0; transform: translateY(30px) scale(0.9); }
      to   { opacity: 0.88; transform: translateY(0) scale(1); }
    }

    /* ── Shared keyframes ───────────────────────────────────────── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-down {
      from { opacity: 0; transform: translate(-50%, -12px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      nav { width: calc(100% - 32px); padding: 10px 18px; }
      .nav-links { gap: 22px; }
      .hero h1 { font-size: 52px; }
      .hero-subtitle { font-size: 18px; }
      .stats { gap: 24px; }
    }

    @media (max-width: 560px) {
      .nav-links { display: none; }
      .hero h1 { font-size: 40px; }
      .hero h1 sup { font-size: 18px; }
      .stats { display: none; }
      body { cursor: auto; }
      .cursor, .cursor-ring { display: none; }
    }
  </style>
</head>

  <script>
    /* ── Custom cursor ─────────────────────────────────────────── */
    const cursor     = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursor-ring');
    const cursorGlow = document.getElementById('cursor-glow');

    let mx = -200, my = -200;
    let rx = -200, ry = -200;
    let gx = -200, gy = -200;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    function tickCursor() {
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';

      rx += (mx - rx) * 0.14;
      ry += (my - ry) * 0.14;
      cursorRing.style.left = rx + 'px';
      cursorRing.style.top  = ry + 'px';

      gx += (mx - gx) * 0.06;
      gy += (my - gy) * 0.06;
      cursorGlow.style.left = gx + 'px';
      cursorGlow.style.top  = gy + 'px';

      requestAnimationFrame(tickCursor);
    }
    tickCursor();

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    });

    /* ── Mouse parallax on skaters ─────────────────────────────── */
    const skaters = [
      { el: document.getElementById('sk1'), depth: 0.020, cx: 0, cy: 0, tx: 0, ty: 0, floatAmp: 20, floatPeriod: 6200, phase: 0,    rotAmp: 2 },
      { el: document.getElementById('sk2'), depth: 0.013, cx: 0, cy: 0, tx: 0, ty: 0, floatAmp: 15, floatPeriod: 7600, phase: 2100, rotAmp: 1.5 },
      { el: document.getElementById('sk3'), depth: 0.024, cx: 0, cy: 0, tx: 0, ty: 0, floatAmp: 18, floatPeriod: 8200, phase: 4400, rotAmp: 2 },
    ];

    const W2 = window.innerWidth  / 2;
    const H2 = window.innerHeight / 2;

    document.addEventListener('mousemove', e => {
      const dx = e.clientX - W2;
      const dy = e.clientY - H2;
      skaters.forEach(s => { s.tx = dx * s.depth; s.ty = dy * s.depth; });
    });

    function tickSkaters(t) {
      skaters.forEach(s => {
        s.cx += (s.tx - s.cx) * 0.055;
        s.cy += (s.ty - s.cy) * 0.055;

        const P   = s.floatPeriod;
        const fy  = Math.sin((t + s.phase) / (P / (Math.PI * 2))) * s.floatAmp;
        const fr  = Math.sin((t + s.phase * 0.6) / (P * 0.85 / (Math.PI * 2))) * s.rotAmp;

        s.el.style.transform = `translate(${s.cx}px, ${s.cy + fy}px) rotate(${fr}deg)`;
      });
      requestAnimationFrame(tickSkaters);
    }
    requestAnimationFrame(tickSkaters);

    /* ── Magnetic CTA button ───────────────────────────────────── */
    const btnWrap = document.getElementById('btn-magnetic-wrap');
    const btnEl   = document.getElementById('btn-magnetic');

    btnWrap.addEventListener('mousemove', function(e) {
      const r  = this.getBoundingClientRect();
      const dx = e.clientX - r.left - r.width  / 2;
      const dy = e.clientY - r.top  - r.height / 2;
      btnEl.style.transform    = `translate(${dx * 0.28}px, ${dy * 0.28}px)`;
      btnEl.style.transition   = 'transform 0.1s ease, background 0.2s, box-shadow 0.3s';
    });

    btnWrap.addEventListener('mouseleave', function() {
      btnEl.style.transform  = 'translate(0,0)';
      btnEl.style.transition = 'transform 0.6s cubic-bezier(0.23,1,0.32,1), background 0.2s, box-shadow 0.3s';
    });

    /* ── Skater click spin ─────────────────────────────────────── */
    skaters.forEach(({ el }) => {
      el.addEventListener('click', () => {
        el.style.transition = 'transform 0.6s cubic-bezier(0.34,1.56,0.64,1)';
        el.style.transform  += ' scale(1.18) rotate(360deg)';
        setTimeout(() => { el.style.transition = ''; }, 650);
      });
    });
  </script>
</body>
</html>
